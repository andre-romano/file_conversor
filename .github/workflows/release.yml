# .github/workflows/release.yml
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

name: Publish GitHub Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # create GitHub releases, push to scoop bucket
  packages: write # push to GHCR (Docker)
  id-token: write # cosign keyless signing (OIDC)
  attestations: write # GitHub artifact attestation

jobs:
  build:
    name: Build packages (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — GoReleaser needs all tags

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.x
          cache: true
      
      - name: Install Inno Setup (Windows only)
        if: runner.os == 'Windows'
        run: |
          choco install innosetup -y
        shell: powershell
        
      - name: Install nFPM (Linux only)
        if: runner.os == 'Linux'
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
        shell: bash

      - name: Build app (go build)
        run: |
          ./scripts/build.sh
        shell: bash

      - name: Build packages (exe, rpm, deb, zip, tar, etc)
        run: |
          ./scripts/package.sh
        shell: bash      

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error
  
  publish_gh:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — GoReleaser needs all tags

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Setting env variables
        run: |
          set -Eeuo pipefail

          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
        shell: bash

      - name: Generate checksums
        run: |
          set -Eeuo pipefail
          cd dist
          sha256sum * > ../checksums.txt          
          mv ../checksums.txt ./
          cat checksums.txt
        shell: bash

      # GitHub Artifact Attestation (SLSA provenance)
      - name: Attest artifacts
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            dist/*

      - name: Publish Git release
        run: |
          set -Eeuo pipefail
          echo "Publishing GitHub release for ${TAG} ..."
          gh release create "${TAG}" dist/* --title="Release ${TAG}" --generate-notes --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
      
      - name: Build and Publish Docker image
        run: |
          set -Eeuo pipefail
          docker buildx build --no-cache \
            --platform linux/amd64 \
            --push \
            -t andreromano/file-conversor:${VERSION} \
            -t andreromano/file-conversor:latest \
            .
        shell: bash

  publish_repo:
    name: Publish repositories (Scoop, Homebrew, Linux repos, etc)
    runs-on: ${{ matrix.os }}
    needs: publish_gh
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — GoReleaser needs all tags

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.x
          cache: true
      
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      
      - name: Setting env variables
        run: |
          set -Eeuo pipefail

          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
        shell: bash
      
      - name: Publish to repositories (${{ matrix.os }})
        run: |
          ./scripts/publish.sh
        shell: bash