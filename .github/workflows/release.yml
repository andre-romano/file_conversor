# .github/workflows/release.yml
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (snapshot, no publish)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write # create GitHub releases, push to scoop bucket
  packages: write # push to GHCR (Docker)
  id-token: write # cosign keyless signing (OIDC)
  attestations: write # GitHub artifact attestation

env:
  GO_VERSION: "1.x"
  GORELEASER_VERSION: "~> v2"
  CHECKSUM_FILE: "checksums.sha256"

jobs:
  # ==========================================================================
  # BUILD — build all targets in parallel
  # ==========================================================================
  build:
    name: Build and release binaries

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — GoReleaser needs all tags

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: ${{ env.GORELEASER_VERSION }}
          install-only: true

      - name: Set up cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build, Publish and Sign with GoReleaser
        run: |
          goreleaser release \
            --clean \
            ${{ inputs.dry_run && '--snapshot --skip=publish' || '' }}
        env:
          CHECKSUM_FILE: ${{ env.CHECKSUM_FILE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}

      # GitHub Artifact Attestation (SLSA provenance)
      - name: Attest artifacts
        if: inputs.dry_run != true
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            dist/*.sha256
            dist/*.sigstore.json
