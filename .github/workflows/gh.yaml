# .github/workflows/gh.yml
name: Git Release CI / CD

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write # required for gh release

jobs:
  read-python-version:
    name: Read Python MIN / MAX version
    runs-on: ubuntu-latest

    outputs:
      PY_MIN: ${{ steps.extract.outputs.min }}
      PY_MAX: ${{ steps.extract.outputs.max }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - id: extract
        run: |
          python ./scripts/get_python_version.py >> $GITHUB_OUTPUT
          echo $GITHUB_OUTPUT
        shell: bash

  test:
    name: Test on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    needs: [read-python-version]

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version:
          - ${{ needs.read-python-version.outputs.PY_MIN }}
          - ${{ needs.read-python-version.outputs.PY_MAX }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache PDM dependencies for Python ${{ matrix.python-version }}
        uses: actions/cache@v4
        with:
          path: |
            __pypackages__/
            .venv/
          key: ${{ runner.os }}-pdm-python-${{ matrix.python-version }}-${{ hashFiles('**/pdm.lock') }}
          restore-keys: |
            ${{ runner.os }}-pdm-python-${{ matrix.python-version }}-

      - name: Install Python  ${{ matrix.python-version }} dependencies for ${{ matrix.os }}
        run: |
          python -m pip install --upgrade pip
          pip install pdm invoke
          pdm install -G gui
          pdm run pip check
        shell: bash

      - name: Testing app on ${{ matrix.os }} with Python ${{ matrix.python-version }}
        run: |
          pdm run invoke base.tests
        shell: bash

      - name: Linting app on ${{ matrix.os }} with Python ${{ matrix.python-version }}
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == needs.read-python-version.outputs.PY_MAX
        run: |
          pdm run invoke base.lint
        shell: bash

  build:
    name: Build on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    needs: [read-python-version, test]

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version:
          - ${{ needs.read-python-version.outputs.PY_MAX }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache PDM dependencies for Python ${{ matrix.python-version }}
        uses: actions/cache@v4
        with:
          path: |
            __pypackages__/
            .venv/
          key: ${{ runner.os }}-pdm-python-${{ matrix.python-version }}-${{ hashFiles('**/pdm.lock') }}
          restore-keys: |
            ${{ runner.os }}-pdm-python-${{ matrix.python-version }}-

      - name: Install Python  ${{ matrix.python-version }} dependencies for ${{ matrix.os }}
        run: |
          python -m pip install --upgrade pip
          pip install pdm invoke
          pdm install -d
        shell: bash

      - name: Build and check Zip portable binaries (${{ matrix.os }})
        run: |
          pdm run invoke zip.check
        shell: bash

      - name: Build and check InnoSetup installer (${{ matrix.os }})
        if: matrix.os == 'windows-latest'
        run: |
          pdm run invoke inno.check
        shell: bash

      - name: Remove dist/ unused artifacts
        run: |
          rm -rf dist/*.tar.gz dist/*.whl
        shell: bash

      - name: Upload dist/ artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.python-version }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Git Release app
    runs-on: ubuntu-latest
    needs: [read-python-version, build]

    strategy:
      matrix:
        python-version:
          - ${{ needs.read-python-version.outputs.PY_MAX }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download dist/ artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Dist files list
        run: |
          ls -l ./dist
        shell: bash

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache PDM dependencies
        uses: actions/cache@v4
        with:
          path: |
            __pypackages__/
            .venv/
          key: ${{ runner.os }}-pdm-python-${{ matrix.python-version }}-${{ hashFiles('**/pdm.lock') }}
          restore-keys: |
            ${{ runner.os }}-pdm-python-${{ matrix.python-version }}-

      - name: Install Python ${{ matrix.python-version }} dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pdm invoke
          pdm install -d
        shell: bash

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        shell: bash

      - name: Publish Git release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pdm run invoke git.publish
        shell: bash
