# .github/workflows/scoop.yml
name: Scoop CI / CD

on:
  workflow_run:
    workflows: [Git Release CI / CD]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write # allow pushing changes

jobs:
  read-python-version:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    name: Read Python MIN / MAX version
    runs-on: ubuntu-latest

    outputs:
      PY_MIN: ${{ steps.extract.outputs.min }}
      PY_MAX: ${{ steps.extract.outputs.max }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - id: extract
        run: |
          python ./scripts/get_python_version.py >> $GITHUB_OUTPUT
          echo $GITHUB_OUTPUT
        shell: bash

  build:
    name: Scoop package CD
    runs-on: windows-latest
    needs: [read-python-version]

    strategy:
      matrix:
        python-version:
          - ${{ needs.read-python-version.outputs.PY_MAX }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: MinoruSekine/setup-scoop@v4.0.2
        with:
          install_scoop: "true"
          buckets: extras
          scoop_update: "true"
          update_path: "true"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache PDM dependencies for Python ${{ matrix.python-version }}
        uses: actions/cache@v4
        with:
          path: |
            __pypackages__/
            .venv/
          key: ${{ runner.os }}-pdm-python-${{ matrix.python-version }}-${{ hashFiles('**/pdm.lock') }}
          restore-keys: |
            ${{ runner.os }}-pdm-python-${{ matrix.python-version }}-

      - name: Install Python ${{ matrix.python-version }} dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pdm invoke
          pdm install -d
        shell: bash

      - name: Build scoop bucket
        run: |
          pdm run invoke scoop.build
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scoop-bucket
          path: bucket/*.json
          if-no-files-found: error

  test:
    name: Test Scoop package (no python installed)
    runs-on: windows-latest
    needs: [build]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: scoop-bucket
          path: bucket
          merge-multiple: true

      - uses: MinoruSekine/setup-scoop@v4.0.2
        with:
          install_scoop: "true"
          buckets: extras
          scoop_update: "true"
          update_path: "true"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        shell: bash

      - name: Install scoop buckets
        run: |
          for file in bucket/*.json; do
            filename=$(basename "$file" | cut -d. -f1)
            echo "Scoop bucket contents for $file:"
            cat "$file"
            echo "Installing scoop bucket for '$filename'..."
            scoop install $file
          done
        shell: bash

      - name: Check scoop install
        run: |
          "file_conversor" --version
        shell: bash

      - name: Publish Scoop bucket
        run: |
          git add bucket/*.json
          git commit -m "Update scoop bucket"
          git push
        shell: bash
